<div class="main-layout">
  <!-- Navbar Top -->
  <div class="navbar py-2 px-3 flex justify-between items-center ">
    <div class="flex items-center gap-6">
      <div class="logo-section flex items-center gap-3">
        <img src="assets/images/windows.svg" alt="windows logo"  />
        <div class="flex flex-col gap-1">
          <h2 class="m-0 text-xl font-bold address" >{{ 'SYRIA_STATS.TITLE' | translate }}</h2>
          <p class="show-text">{{ 'SYRIA_STATS.SUBTITLE' | translate }}</p>
        </div>
      </div>

      <div class="nav-tabs flex items-center gap-6">
        <button class="nav-tab flex items-center gap-2 py-3 px-1 text-sm font-medium transition-colors"
                [class.active]="selectedView === 'Dashboard'"
                (click)="selectedView = 'Dashboard'">
          <i class="pi pi-home"></i>
          {{ 'SYRIA_STATS.DASHBOARD' | translate }}
        </button>
        <button class="nav-tab flex items-center gap-2 py-3 px-1 text-sm font-medium transition-colors"
                [class.active]="selectedView === 'Detailed Statistics'"
                (click)="selectedView = 'Detailed Statistics'">
          <i class="pi pi-file"></i>
          {{ 'SYRIA_STATS.DETAILED_STATISTICS' | translate }}
        </button>
      </div>

    </div>

    <div class="profile-section flex items-center gap-3">
      
      <button (click)="logout()" class="logout-btn px-4 py-2 rounded-xl font-semibold text-sm border transition-colors">
        {{ 'SYRIA_STATS.LOGOUT' | translate }}
      </button>

      <p-menu #langMenu [model]="langItems" [popup]="true"></p-menu>
      <button (click)="langMenu.toggle($event)" class="icon-btn w-10 h-10 flex justify-center items-center rounded-xl border transition-colors">
        <i class="pi pi-globe text-lg"></i>
      </button>

      <div class="profile-badge flex items-center gap-3 rounded-full border">
        <div class="avatar rounded-full flex justify-center items-center font-bold" style="width: 36px; height: 36px;">
          A
        </div>
        <div class="profile-info flex flex-col justify-center">
          <span class="profile-name font-bold text-sm m-0 leading-none">Ahmed Mohamed</span>
          <span class="profile-role font-semibold tracking-wider uppercase mt-1">{{ 'SYRIA_STATS.PREMIUM' | translate }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="content-wrapper p-6 bg-[#F1F1F9] min-h-screen">

    <!-- Conditional Sub-views -->
    <div class="view-container bg-[#F1F1F9] rounded-lg p-3">
      <app-detailed-statistics *ngIf="selectedView === 'Detailed Statistics'"></app-detailed-statistics>
      <app-dashboard *ngIf="selectedView === 'Dashboard'"></app-dashboard>
    </div>

  </div>
</div>
